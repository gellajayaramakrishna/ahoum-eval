<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ahoum — Conversation Evaluator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 24px 40px;
      border-bottom: 1px solid #2a2a4a;
    }

    header h1 {
      font-size: 28px;
      color: #a78bfa;
      letter-spacing: 1px;
    }

    header p {
      color: #888;
      margin-top: 4px;
      font-size: 14px;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 28px;
    }

    .card h2 {
      font-size: 18px;
      color: #a78bfa;
      margin-bottom: 16px;
    }

    textarea {
      width: 100%;
      height: 180px;
      background: #0f0f1a;
      border: 1px solid #3a3a5a;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 14px;
      font-size: 14px;
      resize: vertical;
      font-family: inherit;
    }

    textarea:focus {
      outline: none;
      border-color: #a78bfa;
    }

    button {
      margin-top: 14px;
      background: #7c3aed;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #6d28d9; }
    button:disabled { background: #444; cursor: not-allowed; }

    #status {
      margin-top: 12px;
      font-size: 13px;
      color: #a78bfa;
      min-height: 20px;
    }

    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat-box {
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 12px 20px;
      text-align: center;
      flex: 1;
      min-width: 120px;
    }

    .stat-box .num {
      font-size: 26px;
      font-weight: bold;
      color: #a78bfa;
    }

    .stat-box .label {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .facet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
      max-height: 520px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .facet-item {
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 12px 14px;
    }

    .facet-name {
      font-size: 13px;
      color: #ccc;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .score-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .score-bar {
      flex: 1;
      height: 6px;
      background: #2a2a4a;
      border-radius: 4px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .score-num {
      font-size: 13px;
      font-weight: bold;
      color: #a78bfa;
      min-width: 16px;
      text-align: right;
    }

    .confidence {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }

    .hidden { display: none; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1a2e; }
    ::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <h1>🧠 Ahoum — Conversation Evaluator</h1>
  <p>Score any conversation across 399 psychological & linguistic facets using Llama 3.1</p>
</header>

<div class="container">

  <div class="card">
    <h2>📝 Paste a Conversation</h2>
    <textarea id="convInput" placeholder="Person A: Hi, how are you?&#10;Person B: I'm doing okay, just a bit stressed...&#10;Person A: Want to talk about it?"></textarea>
    <button id="scoreBtn" onclick="scoreConversation()">Analyse Conversation</button>
    <div id="status"></div>
  </div>

  <div class="card hidden" id="resultsCard">
    <h2>📊 Results</h2>
    <div class="stats-row" id="statsRow"></div>
    <div class="facet-grid" id="facetGrid"></div>
  </div>

</div>

<script>
  function getBarColor(score) {
    if (score >= 5) return "#10b981";
    if (score >= 4) return "#34d399";
    if (score >= 3) return "#fbbf24";
    if (score >= 2) return "#f97316";
    return "#ef4444";
  }

  async function scoreConversation() {
    const conv = document.getElementById("convInput").value.trim();
    if (!conv) { alert("Please paste a conversation first!"); return; }

    const btn = document.getElementById("scoreBtn");
    const status = document.getElementById("status");
    btn.disabled = true;
    btn.textContent = "Analysing...";
    status.textContent = "⏳ Sending to Llama 3.1 via Groq... this takes 1-2 minutes";

    try {
      const res = await fetch("/score", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ conversation: conv })
      });
      const data = await res.json();

      if (data.error) {
        status.textContent = "❌ Error: " + data.error;
        return;
      }

      renderResults(data.scores, data.total);
      status.textContent = "✅ Done!";

    } catch (e) {
      status.textContent = "❌ Error: " + e.message;
    } finally {
      btn.disabled = false;
      btn.textContent = "Analyse Conversation";
    }
  }

  function renderResults(scores, total) {
    const card = document.getElementById("resultsCard");
    const grid = document.getElementById("facetGrid");
    const statsRow = document.getElementById("statsRow");
    card.classList.remove("hidden");

    const values = Object.values(scores).map(s => s.score);
    const avg = (values.reduce((a, b) => a + b, 0) / values.length).toFixed(2);
    const high = values.filter(s => s >= 4).length;
    const low = values.filter(s => s <= 2).length;

    statsRow.innerHTML = `
      <div class="stat-box"><div class="num">${total}</div><div class="label">Facets Scored</div></div>
      <div class="stat-box"><div class="num">${avg}</div><div class="label">Avg Score</div></div>
      <div class="stat-box"><div class="num">${high}</div><div class="label">High (4-5)</div></div>
      <div class="stat-box"><div class="num">${low}</div><div class="label">Low (1-2)</div></div>
    `;

    grid.innerHTML = "";
    for (const [facet, data] of Object.entries(scores)) {
      const pct = (data.score / 5) * 100;
      const color = getBarColor(data.score);
      const conf = Math.round((data.confidence || 0) * 100);
      grid.innerHTML += `
        <div class="facet-item">
          <div class="facet-name" title="${facet}">${facet}</div>
          <div class="score-bar-wrap">
            <div class="score-bar">
              <div class="score-fill" style="width:${pct}%;background:${color}"></div>
            </div>
            <div class="score-num">${data.score}</div>
          </div>
          <div class="confidence">Confidence: ${conf}%</div>
        </div>`;
    }

    card.scrollIntoView({ behavior: "smooth" });
  }
</script>

</body>
</html>
